<!DOCTYPE html>
<!-- sync-test 2026-04-23 -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <meta name="msapplication-tap-highlight" content="no">
  <title>NextUp</title>
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NextUp">

  <!-- Preload fonts -->
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=zodiak@400,500,700&display=swap">

  <!-- Stylesheets (load order matters) -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/shared.css">
  <link rel="stylesheet" href="css/customer.css">
  <link rel="stylesheet" href="css/app-dark.css">
  <link rel="stylesheet" href="css/role-select.css">
</head>
<body>
  <!-- Initial loading shell — visible as soon as WebView parses HTML.
       JS replaces this via window.mount() once a view renders. If JS never
       runs (native crash / blank WebView), at least the user sees a brand. -->
  <div id="app">
    <div style="position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#000000; color:#FAFAF9; font-family:'Zodiak', Georgia, serif;">
      <div style="font-size:32px; font-style:italic; letter-spacing:0.02em;">NextUp</div>
      <div style="margin-top:18px; width:26px; height:26px; border:2px solid rgba(250,250,249,0.18); border-top-color:#FAFAF9; border-radius:50%; animation:nxspin 0.9s linear infinite;"></div>
      <div id="nx-boot-msg" style="margin-top:14px; font-family:Satoshi,-apple-system,sans-serif; font-size:12px; color:rgba(250,250,249,0.5);">Starting…</div>
    </div>
  </div>
  <style>@keyframes nxspin { to { transform: rotate(360deg); } }</style>

  <script>
    // Global hard-crash safety net: if ANY uncaught error stops the app from
    // rendering, show a visible screen with a Reload button instead of staying
    // black (which looks like a crash on TestFlight).
    window.addEventListener("error", function (e) {
      var msg = (e && e.message) || "Unknown error";
      var app = document.getElementById("app");
      if (!app) return;
      app.innerHTML =
        '<div style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;color:#FAFAF9;padding:28px;text-align:center;font-family:-apple-system,Satoshi,sans-serif;">' +
        '<div style="font-size:22px;font-family:Zodiak,Georgia,serif;font-style:italic;margin-bottom:16px;">Something went wrong</div>' +
        '<div style="font-size:13px;color:rgba(250,250,249,0.6);max-width:320px;margin-bottom:22px;word-break:break-word;">' + msg + '</div>' +
        '<button onclick="location.reload()" style="padding:14px 28px;background:#FAFAF9;color:#000;border:0;border-radius:999px;font-size:15px;font-family:Satoshi,sans-serif;font-weight:500;">Reload</button>' +
        '</div>';
    });
    // Also catch unhandled promise rejections
    window.addEventListener("unhandledrejection", function (e) {
      console.warn("Unhandled rejection:", e && e.reason);
    });
  </script>

  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/helpers.js"></script>
  <script src="js/api.js"></script>
  <script src="js/services-taxonomy.js"></script>
  <script src="js/taxonomy-helpers.js"></script>
  <script src="js/sheet.js"></script>
  <script src="js/biometric.js"></script>
  <script src="js/push.js"></script>
  <script src="js/location.js"></script>
  <script src="js/location-picker.js"></script>

  <!-- Views (customer-only app) -->
  <script src="js/views/role-select.js"></script>
  <script src="js/views/auth.js"></script>
  <script src="js/views/auth-forgot.js"></script>
  <script src="js/views/change-password.js"></script>
  <script src="js/views/customer/home.js"></script>
  <script src="js/views/customer/category.js"></script>
  <script src="js/views/customer/search-providers.js"></script>
  <script src="js/views/customer/broadcast.js"></script>
  <script src="js/views/customer/responses.js"></script>
  <script src="js/views/customer/provider-view.js"></script>
  <script src="js/views/customer/booking.js"></script>
  <script src="js/views/customer/review.js"></script>
  <script src="js/views/customer/my-requests.js"></script>
  <script src="js/views/customer/messages.js"></script>
  <script src="js/views/thread.js"></script>
  <script src="js/views/customer/profile.js"></script>
  <script src="js/views/customer/become-provider.js"></script>
  <script src="js/views/provider/dashboard.js"></script>
  <script src="js/views/provider/respond.js"></script>
  <script src="js/views/provider/history.js"></script>
  <script src="js/views/provider/messages.js"></script>
  <script src="js/views/provider/profile.js"></script>
  <script src="js/views/provider/billing.js"></script>
  <script src="js/views/provider/rate-customer.js"></script>

  <!-- Router + init (must load last) -->
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
